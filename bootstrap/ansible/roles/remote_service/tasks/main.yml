---
- name: Validate remote service config exists locally
  ansible.builtin.stat:
    path: "{{ remote_service_local_path }}/repo.yaml"
  delegate_to: localhost
  become: false
  register: remote_service_repo_config

- name: Check whether the remote service declares an environment template
  ansible.builtin.stat:
    path: "{{ remote_service_local_path }}/.env.example"
  delegate_to: localhost
  become: false
  register: remote_service_env_example_file

- name: Check whether the remote service has a real environment file
  ansible.builtin.stat:
    path: "{{ remote_service_local_path }}/.env"
  delegate_to: localhost
  become: false
  register: remote_service_env_file

- name: Read remote service repo configuration
  ansible.builtin.slurp:
    src: "{{ remote_service_local_path }}/repo.yaml"
  delegate_to: localhost
  become: false
  register: remote_service_repo_config_content

- name: Parse remote service repo configuration
  ansible.builtin.set_fact:
    remote_service_repo_config_parsed: "{{ remote_service_repo_config_content.content | b64decode | from_yaml }}"

- name: Fail when the remote service directory is incomplete
  ansible.builtin.assert:
    that:
      - remote_service_repo_config.stat.exists
    fail_msg: "Remote service {{ remote_service_name }} is missing repo.yaml."

- name: Fail when .env.example exists without .env
  ansible.builtin.assert:
    that:
      - not remote_service_env_example_file.stat.exists or remote_service_env_file.stat.exists
    fail_msg: >-
      Remote service {{ remote_service_name }} defines .env.example but is missing .env.
      Create remote-services/{{ remote_service_name }}/.env before deployment.

- name: Validate remote service repo config
  ansible.builtin.assert:
    that:
      - remote_service_repo_config_parsed.repo_url is defined
    fail_msg: "Remote service {{ remote_service_name }} repo.yaml must define repo_url."

- name: Enforce remote repo ownership
  ansible.builtin.assert:
    that:
      - remote_service_repo_config_parsed.repo_url is match("^(https://github.com/NoxelS/|git@github.com:NoxelS/|ssh://git@github.com/NoxelS/)")
    fail_msg: "Remote service {{ remote_service_name }} repo_url must be a github.com/NoxelS repository."

- name: Set remote service paths
  ansible.builtin.set_fact:
    remote_service_remote_path: "{{ remote_service_root }}/{{ remote_service_name }}"
    remote_service_repo_checkout: "{{ remote_repo_root }}/{{ remote_service_name }}"
    remote_service_secret_files: >-
      {{ lookup("ansible.builtin.fileglob", remote_service_local_path ~ "/secrets/*", wantlist=True) }}
    remote_service_repo_branch: "{{ remote_service_repo_config_parsed.branch | default('main') }}"
    remote_service_compose_path: "{{ remote_service_repo_config_parsed.compose_path | default('compose.yaml') }}"

- name: Ensure remote service directories exist on the host
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - "{{ remote_service_remote_path }}"
    - "{{ remote_service_repo_checkout }}"

- name: Sync remote service config to the host
  ansible.posix.synchronize:
    src: "{{ remote_service_local_path }}/"
    dest: "{{ remote_service_remote_path }}/"
    recursive: true
    set_remote_user: true
    private_key: "{{ ansible_ssh_private_key_file }}"
    rsync_opts:
      - --exclude=.git/
      - --exclude=secrets/
    use_ssh_args: true
  delegate_to: localhost
  become: false
  register: remote_service_sync_result

- name: Ensure the remote service secrets directory exists
  ansible.builtin.file:
    path: "{{ remote_service_remote_path }}/secrets"
    state: directory
    mode: "0700"
  when: remote_service_secret_files | length > 0

- name: Deploy decrypted remote service secrets
  ansible.builtin.copy:
    dest: "{{ remote_service_remote_path }}/secrets/{{ item | basename }}"
    mode: "0600"
    content: "{{ lookup('ansible.builtin.pipe', 'sops --decrypt ' ~ (item | quote)) }}"
  loop: "{{ remote_service_secret_files }}"
  when: remote_service_secret_files | length > 0
  no_log: true
  register: remote_service_secret_copy_result

- name: Track whether remote service files changed on the host
  ansible.builtin.set_fact:
    remote_service_files_changed: >-
      {{
        remote_service_sync_result is changed
        or (remote_service_secret_copy_result is defined and remote_service_secret_copy_result is changed)
      }}

- name: Ensure remote service repo checkout is present
  ansible.builtin.git:
    repo: "{{ remote_service_repo_config_parsed.repo_url }}"
    dest: "{{ remote_service_repo_checkout }}"
    version: "{{ remote_service_repo_branch }}"
    force: true
    depth: 1

- name: Link remote service env into repo checkout
  ansible.builtin.file:
    src: "{{ remote_service_remote_path }}/.env"
    dest: "{{ remote_service_repo_checkout }}/.env"
    state: link

- name: Check for remote service secrets
  ansible.builtin.stat:
    path: "{{ remote_service_remote_path }}/secrets"
  register: remote_service_secrets_dir

- name: Link remote service secrets into repo checkout
  ansible.builtin.file:
    src: "{{ remote_service_remote_path }}/secrets"
    dest: "{{ remote_service_repo_checkout }}/secrets"
    state: link
  when: remote_service_secrets_dir.stat.exists

- name: Start the remote service stack
  community.docker.docker_compose_v2:
    project_src: "{{ remote_service_repo_checkout }}"
    files:
      - "{{ remote_service_compose_path }}"
    remove_orphans: true
    state: present
  register: remote_service_compose_result

- name: Restart the remote service stack when bind-mounted files changed
  community.docker.docker_compose_v2:
    project_src: "{{ remote_service_repo_checkout }}"
    files:
      - "{{ remote_service_compose_path }}"
    state: restarted
  when:
    - remote_service_files_changed
    - not remote_service_compose_result.changed
