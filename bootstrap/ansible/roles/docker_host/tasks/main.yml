---
# Install Docker from Docker's own Debian repository so the host gets the
# current engine and Compose plugin instead of older distro-packaged versions.
- name: Ensure Docker apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install Docker apt signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Configure Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ "arm64" if ansible_architecture in ["aarch64", "arm64"] else "amd64" }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_host_apt_packages }}"
    state: present
    update_cache: true

# Daemon config is optional; when provided, the handler restarts Docker so the
# new engine settings actually take effect.
- name: Configure Docker daemon
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: "0644"
    content: "{{ docker_host_daemon_config | to_nice_json }}"
  when: docker_host_daemon_config | length > 0
  notify: Restart docker

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

# These are host-level conveniences and shared prerequisites for later service
# deployments: admin access to Docker and the shared edge network.
- name: Add admin users to the Docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_host_admin_users }}"

- name: Ensure shared Docker networks exist
  community.docker.docker_network:
    name: "{{ item }}"
    state: present
  loop: "{{ docker_host_networks }}"
