services:
  caddy:
    image: caddy:2.10
    env_file:
      - ./.env
    labels:
      - diun.enable=true
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./secrets/origin.crt:/etc/caddy/certs/origin.crt:ro
      - ./secrets/origin.key:/etc/caddy/certs/origin.key:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - edge

networks:
  edge:
    external: true

volumes:
  caddy-data:
  caddy-config:
