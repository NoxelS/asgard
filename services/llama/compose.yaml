services:
  llama-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --models-dir
      - /models
      - --models-max
      - ${MODELS_MAX}
      - --ctx-size
      - ${CONTEXT_SIZE}
      - --parallel
      - ${PARALLEL_REQUESTS}
      - --threads
      - ${THREADS}
      - --n-predict
      - ${N_PREDICT}
      - --batch-size
      - "2048"
      - --ubatch-size
      - "512"
      - --flash-attn
      - on
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --slot-save-path
      - /cache/slots
      - --metrics
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    expose:
      - "8080"
    labels:
      - diun.enable=true
    restart: unless-stopped
    volumes:
      - ${MODEL_DIR}:/models:ro
      - llama-cache:/cache
    networks:
      - apps

  llama-embeddings:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --models-dir
      - /models
      - --models-max
      - ${MODELS_MAX}
      - --ctx-size
      - ${CONTEXT_SIZE}
      - --parallel
      - ${PARALLEL_REQUESTS}
      - --threads
      - ${THREADS}
      - --embedding
      - --pooling
      - mean
      - --batch-size
      - "2048"
      - --ubatch-size
      - "512"
      - --flash-attn
      - on
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --metrics
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    expose:
      - "8080"
    labels:
      - diun.enable=true
    restart: unless-stopped
    volumes:
      - ${MODEL_DIR}:/models:ro
    networks:
      - apps

  llama-reranking:
    image: ghcr.io/ggml-org/llama.cpp:server
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --models-dir
      - /models
      - --models-max
      - ${MODELS_MAX}
      - --ctx-size
      - ${CONTEXT_SIZE}
      - --parallel
      - ${PARALLEL_REQUESTS}
      - --threads
      - ${THREADS}
      - --reranking
      - --batch-size
      - "2048"
      - --ubatch-size
      - "512"
      - --flash-attn
      - on
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --metrics
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    expose:
      - "8080"
    labels:
      - diun.enable=true
    restart: unless-stopped
    volumes:
      - ${MODEL_DIR}:/models:ro
    networks:
      - apps

volumes:
  llama-cache:

networks:
  apps:
    external: true
