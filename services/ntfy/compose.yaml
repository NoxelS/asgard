services:
  ntfy:
    image: binwiederhier/ntfy:v2.22.0
    command: serve
    env_file:
      - ./.env
    labels:
      - diun.enable=true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    init: true
    restart: unless-stopped
    volumes:
      - ntfy-cache:/var/cache/ntfy
    networks:
      - edge

networks:
  edge:
    external: true

volumes:
  ntfy-cache:
