services:
  webhooks:
    image: docker:28.3.2-cli-alpine3.22
    command:
      - sh
      - -ceu
      - |
        apk add --no-cache curl webhook
        secret="$$(cat /run/secrets/webhook_secret)"
        sed "s|__WEBHOOK_SECRET__|$${secret}|g" /config/hooks.yaml.tpl > /tmp/hooks.yaml
        exec webhook -hooks /tmp/hooks.yaml -http-methods POST -port 9000 -verbose
    env_file:
      - ./.env
    labels:
      - diun.enable=true
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    init: true
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/services:/opt/services
      - ./hooks.yaml.tpl:/config/hooks.yaml.tpl:ro
      - ./service-map.tsv:/config/service-map.tsv:ro
      - ./update-service.sh:/config/update-service.sh:ro
      - ./secrets/webhook_secret:/run/secrets/webhook_secret:ro
    networks:
      - edge

networks:
  edge:
    external: true
