services:
  openpanel-db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - openpanel-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - diun.enable=true
    restart: unless-stopped
    networks:
      - openpanel

  openpanel-kv:
    image: redis:7.2.5-alpine
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    volumes:
      - openpanel-kv-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - diun.enable=true
    restart: unless-stopped
    networks:
      - openpanel

  openpanel-clickhouse:
    image: clickhouse/clickhouse-server:25.10.2.65
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    volumes:
      - openpanel-clickhouse-data:/var/lib/clickhouse
      - openpanel-clickhouse-logs:/var/log/clickhouse-server
      - ./clickhouse/clickhouse-config.xml:/etc/clickhouse-server/config.d/op-config.xml:ro
      - ./clickhouse/clickhouse-user-config.xml:/etc/clickhouse-server/users.d/op-user-config.xml:ro
      - ./clickhouse/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    labels:
      - diun.enable=true
    restart: unless-stopped
    networks:
      - openpanel

  openpanel-api:
    image: lindesvard/openpanel-api:2
    command: >
      sh -c "
        echo 'Running migrations...'
        CI=true pnpm -r run migrate:deploy

        pnpm start
      "
    env_file:
      - ./.env
    depends_on:
      openpanel-db:
        condition: service_healthy
      openpanel-clickhouse:
        condition: service_healthy
      openpanel-kv:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - diun.enable=true
    restart: unless-stopped
    networks:
      - openpanel
      - edge

  openpanel-dashboard:
    image: lindesvard/openpanel-dashboard:2
    env_file:
      - ./.env
    depends_on:
      openpanel-api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - diun.enable=true
    restart: unless-stopped
    networks:
      - openpanel
      - edge

  openpanel-worker:
    image: lindesvard/openpanel-worker:2
    env_file:
      - ./.env
    depends_on:
      openpanel-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      mode: replicated
      replicas: ${OP_WORKER_REPLICAS}
    labels:
      - diun.enable=true
    restart: unless-stopped
    networks:
      - openpanel

volumes:
  openpanel-db-data:
  openpanel-kv-data:
  openpanel-clickhouse-data:
  openpanel-clickhouse-logs:

networks:
  openpanel:
  edge:
    external: true
